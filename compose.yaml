services:
  app:
    build: .
    tty: true
    ports:
      - 8000:8000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: diary_user
      POSTGRES_PASSWORD: diary_password
      POSTGRES_DB: digital_diary
      TZ: "Asia/Tokyo"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  node_modules:
  db_data: